<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 680" width="900" height="680" font-family="'Segoe UI', system-ui, sans-serif">
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#64748b" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arr-green" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#22c55e" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arr-dashed" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#475569" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a0f1e"/>
      <stop offset="100%" stop-color="#0f1a2e"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="900" height="680" fill="url(#bg)" rx="12"/>

  <!-- Grid -->
  <g stroke="#ffffff" stroke-width="0.3" opacity="0.035">
    <line x1="0" y1="80" x2="900" y2="80"/>
    <line x1="0" y1="180" x2="900" y2="180"/>
    <line x1="0" y1="280" x2="900" y2="280"/>
    <line x1="0" y1="380" x2="900" y2="380"/>
    <line x1="0" y1="480" x2="900" y2="480"/>
    <line x1="0" y1="580" x2="900" y2="580"/>
    <line x1="150" y1="0" x2="150" y2="680"/>
    <line x1="300" y1="0" x2="300" y2="680"/>
    <line x1="450" y1="0" x2="450" y2="680"/>
    <line x1="600" y1="0" x2="600" y2="680"/>
    <line x1="750" y1="0" x2="750" y2="680"/>
  </g>

  <!-- Title -->
  <text x="450" y="36" text-anchor="middle" font-size="20" font-weight="700" fill="#f8fafc" letter-spacing="3">Food Delivery Backend</text>
  <text x="450" y="56" text-anchor="middle" font-size="11" fill="#475569" letter-spacing="2">PRODUCTION-READY REST API  ·  SPRING BOOT 3  ·  JWT  ·  POSTGRESQL</text>

  <!-- ── CLIENTS ROW ── -->
  <!-- Customer -->
  <rect x="60" y="78" width="150" height="40" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="135" y="103" text-anchor="middle" font-size="12" font-weight="600" fill="#94a3b8">Customer</text>

  <!-- Restaurant Owner -->
  <rect x="375" y="78" width="150" height="40" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="450" y="103" text-anchor="middle" font-size="12" font-weight="600" fill="#94a3b8">Restaurant Owner</text>

  <!-- Admin (future) -->
  <rect x="690" y="78" width="150" height="40" rx="8" fill="#1e293b" stroke="#1e293b" stroke-width="1" stroke-dasharray="4 3" opacity="0.6"/>
  <text x="765" y="98" text-anchor="middle" font-size="12" font-weight="500" fill="#475569">Admin</text>
  <text x="765" y="113" text-anchor="middle" font-size="10" fill="#334155">future scope</text>

  <!-- Arrows from clients to gateway -->
  <line x1="135" y1="118" x2="320" y2="168" stroke="#64748b" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="450" y1="118" x2="450" y2="168" stroke="#64748b" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="765" y1="118" x2="600" y2="168" stroke="#475569" stroke-width="1" stroke-dasharray="4 3" marker-end="url(#arr-dashed)"/>

  <!-- ── API LAYER ── -->
  <rect x="200" y="170" width="500" height="60" rx="10" fill="#1a1f3a" stroke="#6366f1" stroke-width="1.5"/>
  <text x="450" y="196" text-anchor="middle" font-size="14" font-weight="700" fill="#e0e7ff">Spring Boot REST API</text>
  <text x="450" y="218" text-anchor="middle" font-size="11" fill="#818cf8">Spring Security · JWT Auth · Role-Based Authorization · Swagger UI  ·  :8080</text>

  <!-- Arrow down to modules -->
  <line x1="450" y1="230" x2="450" y2="268" stroke="#64748b" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ── MODULE LAYER ── -->
  <!-- Auth -->
  <rect x="40" y="270" width="130" height="56" rx="8" fill="#1a2e1a" stroke="#22c55e" stroke-width="1.5"/>
  <text x="105" y="294" text-anchor="middle" font-size="12" font-weight="700" fill="#bbf7d0">Auth Module</text>
  <text x="105" y="313" text-anchor="middle" font-size="10" fill="#4ade80">Register · Login · JWT</text>

  <!-- Restaurant -->
  <rect x="190" y="270" width="130" height="56" rx="8" fill="#1a2e1a" stroke="#22c55e" stroke-width="1.5"/>
  <text x="255" y="294" text-anchor="middle" font-size="12" font-weight="700" fill="#bbf7d0">Restaurant</text>
  <text x="255" y="313" text-anchor="middle" font-size="10" fill="#4ade80">CRUD · Toggle status</text>

  <!-- Menu -->
  <rect x="340" y="270" width="130" height="56" rx="8" fill="#1a2e1a" stroke="#22c55e" stroke-width="1.5"/>
  <text x="405" y="294" text-anchor="middle" font-size="12" font-weight="700" fill="#bbf7d0">Menu Module</text>
  <text x="405" y="313" text-anchor="middle" font-size="10" fill="#4ade80">Categories · Items</text>

  <!-- Cart -->
  <rect x="490" y="270" width="130" height="56" rx="8" fill="#1a2e1a" stroke="#22c55e" stroke-width="1.5"/>
  <text x="555" y="294" text-anchor="middle" font-size="12" font-weight="700" fill="#bbf7d0">Cart Module</text>
  <text x="555" y="313" text-anchor="middle" font-size="10" fill="#4ade80">Add · View · Clear</text>

  <!-- Orders -->
  <rect x="640" y="270" width="130" height="56" rx="8" fill="#1a2e1a" stroke="#22c55e" stroke-width="1.5"/>
  <text x="705" y="294" text-anchor="middle" font-size="12" font-weight="700" fill="#bbf7d0">Order Module</text>
  <text x="705" y="313" text-anchor="middle" font-size="10" fill="#4ade80">Lifecycle · Status</text>

  <!-- Fan-out lines from API to modules -->
  <line x1="380" y1="230" x2="105" y2="268" stroke="#22c55e" stroke-width="1" opacity="0.4" marker-end="url(#arr-green)"/>
  <line x1="410" y1="230" x2="255" y2="268" stroke="#22c55e" stroke-width="1" opacity="0.4" marker-end="url(#arr-green)"/>
  <line x1="440" y1="230" x2="405" y2="268" stroke="#22c55e" stroke-width="1" opacity="0.4" marker-end="url(#arr-green)"/>
  <line x1="480" y1="230" x2="555" y2="268" stroke="#22c55e" stroke-width="1" opacity="0.4" marker-end="url(#arr-green)"/>
  <line x1="510" y1="230" x2="705" y2="268" stroke="#22c55e" stroke-width="1" opacity="0.4" marker-end="url(#arr-green)"/>

  <!-- ── LAYERED ARCHITECTURE ── -->
  <!-- Label -->
  <text x="450" y="358" text-anchor="middle" font-size="10" fill="#475569" letter-spacing="1">LAYERED ARCHITECTURE (per module)</text>
  <line x1="200" y1="363" x2="370" y2="363" stroke="#334155" stroke-width="0.5"/>
  <line x1="530" y1="363" x2="700" y2="363" stroke="#334155" stroke-width="0.5"/>

  <!-- Controller → Service → Repository → DB chain -->
  <rect x="170" y="372" width="130" height="40" rx="6" fill="#1e293b" stroke="#475569" stroke-width="1"/>
  <text x="235" y="397" text-anchor="middle" font-size="12" font-weight="600" fill="#94a3b8">Controller</text>

  <line x1="300" y1="392" x2="338" y2="392" stroke="#64748b" stroke-width="1.5" marker-end="url(#arr)"/>

  <rect x="340" y="372" width="130" height="40" rx="6" fill="#1e293b" stroke="#475569" stroke-width="1"/>
  <text x="405" y="397" text-anchor="middle" font-size="12" font-weight="600" fill="#94a3b8">Service</text>

  <line x1="470" y1="392" x2="508" y2="392" stroke="#64748b" stroke-width="1.5" marker-end="url(#arr)"/>

  <rect x="510" y="372" width="130" height="40" rx="6" fill="#1e293b" stroke="#475569" stroke-width="1"/>
  <text x="575" y="397" text-anchor="middle" font-size="12" font-weight="600" fill="#94a3b8">Repository</text>

  <line x1="640" y1="392" x2="678" y2="392" stroke="#64748b" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ── ORDER LIFECYCLE ── -->
  <text x="450" y="448" text-anchor="middle" font-size="10" fill="#475569" letter-spacing="1">ORDER LIFECYCLE</text>
  <line x1="200" y1="452" x2="360" y2="452" stroke="#334155" stroke-width="0.5"/>
  <line x1="540" y1="452" x2="700" y2="452" stroke="#334155" stroke-width="0.5"/>

  <!-- Status pills -->
  <rect x="50" y="460" width="100" height="30" rx="15" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1"/>
  <text x="100" y="479" text-anchor="middle" font-size="11" font-weight="600" fill="#93c5fd">PENDING</text>

  <line x1="150" y1="475" x2="178" y2="475" stroke="#64748b" stroke-width="1.5" marker-end="url(#arr)"/>

  <rect x="180" y="460" width="110" height="30" rx="15" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1"/>
  <text x="235" y="479" text-anchor="middle" font-size="11" font-weight="600" fill="#93c5fd">CONFIRMED</text>

  <line x1="290" y1="475" x2="318" y2="475" stroke="#64748b" stroke-width="1.5" marker-end="url(#arr)"/>

  <rect x="320" y="460" width="120" height="30" rx="15" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1"/>
  <text x="380" y="479" text-anchor="middle" font-size="11" font-weight="600" fill="#93c5fd">PREPARING</text>

  <line x1="440" y1="475" x2="468" y2="475" stroke="#64748b" stroke-width="1.5" marker-end="url(#arr)"/>

  <rect x="470" y="460" width="150" height="30" rx="15" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1"/>
  <text x="545" y="479" text-anchor="middle" font-size="11" font-weight="600" fill="#93c5fd">OUT FOR DELIVERY</text>

  <line x1="620" y1="475" x2="648" y2="475" stroke="#64748b" stroke-width="1.5" marker-end="url(#arr)"/>

  <rect x="650" y="460" width="110" height="30" rx="15" fill="#134e4a" stroke="#10b981" stroke-width="1.5"/>
  <text x="705" y="479" text-anchor="middle" font-size="11" font-weight="600" fill="#6ee7b7">DELIVERED</text>

  <!-- CANCELLED branch -->
  <line x1="100" y1="490" x2="100" y2="516" stroke="#ef4444" stroke-width="1" stroke-dasharray="3 3" marker-end="url(#arr)"/>
  <rect x="40" y="518" width="120" height="28" rx="14" fill="#450a0a" stroke="#ef4444" stroke-width="1"/>
  <text x="100" y="536" text-anchor="middle" font-size="11" font-weight="600" fill="#fca5a5">CANCELLED</text>
  <text x="100" y="558" text-anchor="middle" font-size="10" fill="#475569">from PENDING only</text>

  <!-- ── DATABASE ── -->
  <rect x="170" y="580" width="560" height="72" rx="10" fill="#1a1a2e" stroke="#4f46e5" stroke-width="1.5"/>
  <text x="450" y="606" text-anchor="middle" font-size="13" font-weight="700" fill="#c7d2fe">PostgreSQL Database</text>
  <text x="450" y="626" text-anchor="middle" font-size="10" fill="#6366f1">users  ·  restaurants  ·  categories  ·  menu_items  ·  carts  ·  cart_items  ·  orders  ·  order_items</text>
  <text x="450" y="642" text-anchor="middle" font-size="10" fill="#4338ca">JPA / Hibernate  ·  Spring Data Repositories</text>

  <!-- Repository → DB arrow -->
  <line x1="575" y1="412" x2="490" y2="578" stroke="#475569" stroke-width="1" stroke-dasharray="4 3" marker-end="url(#arr-dashed)"/>

  <!-- Future scope box -->
  <rect x="720" y="372" width="150" height="100" rx="8" fill="#0f172a" stroke="#334155" stroke-width="1" stroke-dasharray="4 3" opacity="0.8"/>
  <text x="795" y="396" text-anchor="middle" font-size="11" font-weight="600" fill="#475569">Future Scope</text>
  <text x="795" y="416" text-anchor="middle" font-size="10" fill="#334155">Razorpay Payments</text>
  <text x="795" y="433" text-anchor="middle" font-size="10" fill="#334155">Real-time Tracking</text>
  <text x="795" y="450" text-anchor="middle" font-size="10" fill="#334155">Reviews &amp; Ratings</text>
  <text x="795" y="467" text-anchor="middle" font-size="10" fill="#334155">Microservices</text>

  <!-- Legend -->
  <line x1="200" y1="662" x2="220" y2="662" stroke="#22c55e" stroke-width="1.5" marker-end="url(#arr-green)"/>
  <text x="225" y="666" font-size="10" fill="#475569">Module routing</text>
  <line x1="310" y1="662" x2="330" y2="662" stroke="#64748b" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="335" y="666" font-size="10" fill="#475569">Data flow</text>
  <line x1="410" y1="662" x2="430" y2="662" stroke="#475569" stroke-width="1" stroke-dasharray="4 3" marker-end="url(#arr-dashed)"/>
  <text x="435" y="666" font-size="10" fill="#475569">Future / DB</text>
</svg>
